[config]
# Matugen configuration installed by matugen-kde.
# Template paths are rewritten by install.sh to point at the installed
# templates directory (default: ~/.config/matugen/templates).

# ---- Alacritty ----
[templates.alacritty]
input_path  = '@TEMPLATES@/terminal/alacritty.toml'
output_path = '~/.config/alacritty/themes/matugen.toml'

# ---- btop ----
[templates.btop]
input_path  = '@TEMPLATES@/btop.theme'
output_path = '~/.config/btop/themes/matugen.theme'

# ---- Discord: Noctalia Material (BetterDiscord) ----
[templates.discord-material-betterdiscord]
input_path  = '@TEMPLATES@/discord-material.css'
output_path = '~/.config/BetterDiscord/themes/matugen-material.theme.css'

# ---- Discord: Noctalia Material (Vesktop) ----
[templates.discord-material-vesktop]
input_path  = '@TEMPLATES@/discord-material.css'
output_path = '~/.config/vesktop/themes/matugen-material.theme.css'

# ---- Discord: Noctalia Midnight (BetterDiscord) ----
[templates.discord-midnight-betterdiscord]
input_path  = '@TEMPLATES@/discord-midnight.css'
output_path = '~/.config/BetterDiscord/themes/matugen-midnight.theme.css'

# ---- Discord: Noctalia Midnight (Vesktop) ----
[templates.discord-midnight-vesktop]
input_path  = '@TEMPLATES@/discord-midnight.css'
output_path = '~/.config/vesktop/themes/matugen-midnight.theme.css'

# ---- GTK 3 ----
[templates.gtk3]
input_path  = '@TEMPLATES@/gtk3.css'
output_path = '~/.config/gtk-3.0/matugen.css'

# ---- GTK 4 ----
[templates.gtk4]
input_path  = '@TEMPLATES@/gtk4.css'
output_path = '~/.config/gtk-4.0/matugen.css'

# ---- KDE color scheme ----
[templates.kcolorscheme]
input_path  = '@TEMPLATES@/kcolorscheme.colors'
output_path = '~/.local/share/color-schemes/matugen.colors'

# ---- pywalfox ----
[templates.pywalfox]
input_path  = '@TEMPLATES@/pywalfox.json'
output_path = '~/.cache/wal/colors.json'

# ---- Qt5ct ----
[templates.qt5ct]
input_path  = '@TEMPLATES@/qtct.conf'
output_path = '~/.config/qt5ct/colors/matugen.conf'

# ---- Qt6ct ----
[templates.qt6ct]
input_path  = '@TEMPLATES@/qtct.conf'
output_path = '~/.config/qt6ct/colors/matugen.conf'
