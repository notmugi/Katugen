# Noctalia — Alacritty user template
# Based on the default alacritty.toml noctalia template,
# with values updated to mirror kitty.conf

[colors.primary]
background = '{{colors.surface.default.hex}}'
foreground = '{{colors.on_surface.default.hex}}'

[colors.cursor]
text   = '{{colors.surface.default.hex}}'
cursor = '{{colors.on_surface.default.hex}}'

[colors.vi_mode_cursor]
text   = '{{colors.surface.default.hex}}'
cursor = '{{colors.primary.default.hex}}'

[colors.search.matches]
foreground = '{{colors.surface_variant.default.hex}}'
background = '{{colors.tertiary.default.hex}}'

[colors.search.focused_match]
foreground = '{{colors.surface_variant.default.hex}}'
background = '{{colors.primary.default.hex}}'

[colors.footer_bar]
foreground = '{{colors.surface_variant.default.hex}}'
background = '{{colors.on_surface.default.hex}}'

[colors.hints.start]
foreground = '{{colors.surface_variant.default.hex}}'
background = '{{colors.secondary.default.hex}}'

[colors.hints.end]
foreground = '{{colors.surface_variant.default.hex}}'
background = '{{colors.secondary.default.hex}}'

[colors.selection]
text       = '{{colors.on_surface_variant.default.hex}}'
background = '{{colors.surface_variant.default.hex}}'

# color0–color7 — mirrors kitty.conf
[colors.normal]
black   = '{{colors.surface.default.hex}}'
red     = '{{colors.error.default.hex}}'
green   = '{{colors.primary.default.hex}}'
yellow  = '{{colors.secondary.default.hex}}'
blue    = '{{colors.tertiary.default.hex}}'
magenta = '{{colors.primary_fixed_dim.default.hex}}'
cyan    = '{{colors.secondary_fixed_dim.default.hex}}'
white   = '{{colors.on_surface.default.hex}}'

# color8–color15 — mirrors kitty.conf
[colors.bright]
black   = '{{colors.outline.default.hex}}'
red     = '{{colors.error.default.hex}}'
green   = '{{colors.primary.default.hex}}'
yellow  = '{{colors.secondary.default.hex}}'
blue    = '{{colors.tertiary.default.hex}}'
magenta = '{{colors.primary_fixed_dim.default.hex}}'
cyan    = '{{colors.secondary_fixed_dim.default.hex}}'
white   = '{{colors.on_surface.default.hex}}'

# dim — darker variants of the same kitty palette
[colors.dim]
black   = '{{colors.surface_variant.default.hex}}'
red     = '{{colors.error_container.default.hex}}'
green   = '{{colors.primary_container.default.hex}}'
yellow  = '{{colors.secondary_container.default.hex}}'
blue    = '{{colors.tertiary_container.default.hex}}'
magenta = '{{colors.primary_fixed.default.hex}}'
cyan    = '{{colors.secondary_fixed.default.hex}}'
white   = '{{colors.on_surface_variant.default.hex}}'
